<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Admin | Alo Rico</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#111827;
    color:white;
    min-height:100vh;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(0,0,0,.82),rgba(0,0,0,.88)),
    url('https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=1600&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    z-index:-1;
}

.container{
    width:100%;
    max-width:1300px;
    margin:auto;
    padding:30px 20px 80px;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.logo{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #facc15;
    background:white;
    margin-bottom:20px;
    box-shadow:0 0 30px rgba(250,204,21,.35);
}

.header h1{
    font-size:42px;
    color:#facc15;
    margin-bottom:10px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:28px;
}

.card{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.08);
    border-radius:28px;
    padding:28px;
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,.30);
}

.card h2{
    margin-bottom:22px;
    color:#facc15;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:600;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#1f2937;
    color:white;
    outline:none;
    font-size:15px;
}

.form-group textarea{
    min-height:100px;
    resize:vertical;
}

.preview{
    width:100%;
    height:240px;
    background:#1f2937;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:12px;
}

.preview img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:#22c55e;
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

.btn:hover{
    transform:translateY(-2px);
}

.products{
    display:flex;
    flex-direction:column;
    gap:18px;
    max-height:900px;
    overflow:auto;
}

.product-card{
    background:rgba(255,255,255,.05);
    border-radius:22px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.05);
}

.product-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.product-info{
    padding:18px;
}

.product-info h3{
    margin-bottom:10px;
}

.product-info p{
    opacity:.85;
    margin-bottom:14px;
    line-height:1.5;
}

.price{
    font-size:24px;
    font-weight:700;
    color:#22c55e;
    margin-bottom:14px;
}

.tags{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:14px;
}

.tag{
    background:#374151;
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
}

.actions{
    display:flex;
    gap:10px;
}

.delete{
    flex:1;
    border:none;
    padding:12px;
    border-radius:12px;
    background:#dc2626;
    color:white;
    font-weight:700;
    cursor:pointer;
}

@media(max-width:950px){

    .grid{
        grid-template-columns:1fr;
    }

}

</style>
</head>
<body>

<div class="container">

    <div class="header">

        <img src="logo.png" class="logo">

        <h1>Panel Administrativo</h1>

    </div>

    <div class="grid">

        <!-- FORM -->

        <div class="card">

            <h2>➕ Nuevo Producto</h2>

            <div class="form-group">
                <label>Nombre del producto</label>
                <input type="text" id="nombre">
            </div>

            <div class="form-group">
                <label>Ingredientes / Descripción</label>
                <textarea id="descripcion"></textarea>
            </div>

            <div class="form-group">
                <label>Precio</label>
                <input type="number" id="precio">
            </div>

            <div class="form-group">
                <label>Categoría</label>
                <select id="categoria">
                    <option value="pizza">Pizza</option>
                    <option value="hamburguesa">Hamburguesa</option>
                    <option value="lomitos">Lomitos</option>
                    <option value="bebidas">Bebidas</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tamaño / Variante</label>
                <input type="text" id="tamano">
            </div>

            <div class="form-group">
                <label>Estado</label>
                <select id="estado">
                    <option>Disponible</option>
                    <option>Agotado</option>
                    <option>Oculto</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tiempo estimado</label>
                <input type="text" id="tiempo">
            </div>

            <div class="form-group">
                <label>Imagen del producto</label>
                <input type="file" id="imgInput" accept="image/*">
            </div>

            <div class="preview" id="preview">
                Vista previa
            </div>

            <br>

            <button class="btn" id="guardarBtn">
                Guardar producto
            </button>

        </div>

        <!-- PRODUCTOS -->

        <div class="card">

            <h2>📦 Productos Cargados</h2>

            <div class="products" id="productos">

            </div>

        </div>

    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
 getDatabase,
 ref,
 push,
 onValue,
 remove
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

import {
 getStorage,
 ref as storageRef,
 uploadBytes,
 getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

/* FIREBASE */

const firebaseConfig = {

 apiKey: "AIzaSyADGYsqhbCFuKj2fXpontLpND_rtT7Nlno",

 authDomain: "alorico-59754.firebaseapp.com",

 databaseURL: "https://alorico-59754-default-rtdb.firebaseio.com",

 projectId: "alorico-59754",

 storageBucket: "alorico-59754.appspot.com"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const storage = getStorage(app);

/* ELEMENTOS */

const imgInput = document.getElementById("imgInput");

const preview = document.getElementById("preview");

const guardarBtn = document.getElementById("guardarBtn");

const productosDiv = document.getElementById("productos");

let imagenArchivo = null;

/* PREVIEW */

imgInput.addEventListener("change",(e)=>{

 imagenArchivo = e.target.files[0];

 if(imagenArchivo){

  const reader = new FileReader();

  reader.onload = (event)=>{

   preview.innerHTML =
   `<img src="${event.target.result}">`;
  };

  reader.readAsDataURL(imagenArchivo);
 }
});

/* GUARDAR */

guardarBtn.onclick = async ()=>{

 const nombre =
 document.getElementById("nombre").value;

 const descripcion =
 document.getElementById("descripcion").value;

 const precio =
 document.getElementById("precio").value;

 const categoria =
 document.getElementById("categoria").value;

 const tamano =
 document.getElementById("tamano").value;

 const estado =
 document.getElementById("estado").value;

 const tiempo =
 document.getElementById("tiempo").value;

 if(!nombre || !precio || !imagenArchivo){

  alert("Completa todos los campos");

  return;
 }

 guardarBtn.innerText = "Subiendo...";

 /* SUBIR IMAGEN */

 const archivoRef =
 storageRef(
  storage,
  "productos/" + Date.now() + "_" + imagenArchivo.name
 );

 await uploadBytes(
  archivoRef,
  imagenArchivo
 );

 const imagenURL =
 await getDownloadURL(archivoRef);

 /* GUARDAR PRODUCTO */

 push(ref(db,"productos"),{

  nombre,
  descripcion,
  precio,
  categoria,
  tamano,
  estado,
  tiempo,
  imagen: imagenURL
 });

 guardarBtn.innerText = "Guardar producto";

 alert("Producto guardado");

 location.reload();
};

/* MOSTRAR PRODUCTOS */

onValue(ref(db,"productos"),(snap)=>{

 productosDiv.innerHTML = "";

 const data = snap.val();

 if(data){

  Object.entries(data).reverse().forEach(([key,p])=>{

   const div =
   document.createElement("div");

   div.className = "product-card";

   div.innerHTML = `

    <img src="${p.imagen}">

    <div class="product-info">

        <h3>${p.nombre}</h3>

        <p>${p.descripcion}</p>

        <div class="tags">

            <div class="tag">${p.categoria}</div>

            <div class="tag">${p.estado}</div>

            <div class="tag">${p.tamano}</div>

        </div>

        <div class="price">
            Gs. ${Number(p.precio).toLocaleString()}
        </div>

        <div class="actions">

            <button class="delete">
                Eliminar
            </button>

        </div>

    </div>
   `;

   div.querySelector(".delete")
   .onclick = ()=>{

    if(confirm("Eliminar producto?")){

     remove(ref(db,"productos/" + key));
    }
   };

   productosDiv.appendChild(div);
  });
 }
});

</script>

</body>
</html>
